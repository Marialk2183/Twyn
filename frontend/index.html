<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LockChat — Secure, private, end-to-end encrypted 1-to-1 chat with voice & video calls">
  <meta name="robots" content="noindex, nofollow">
  <title>LockChat — Private Encrypted Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <main class="landing">
    <div class="landing-card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon-wrap">
          <div class="logo-ring"></div>
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v2h6V7a3 3 0 0 0-3-3zm0 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
            </svg>
          </div>
        </div>
        <h1 class="logo-title">LockChat</h1>
        <p class="logo-sub" id="logo-sub"></p>
      </div>

      <!-- Create Room -->
      <button class="btn btn-primary" id="create-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" width="17" height="17">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        <span id="spinner"></span>
        Create Private Room
      </button>

      <div class="divider">or join with a code</div>

      <!-- Join Room -->
      <div class="join-row">
        <input
          type="text"
          id="join-input"
          placeholder="Room code (e.g. ABX92K)"
          maxlength="128"
          autocomplete="off"
          spellcheck="false"
          aria-label="Room code or link"
        >
        <button class="btn btn-secondary btn-sm" id="join-btn">Join</button>
      </div>

      <div id="status-msg" class="status-msg" role="alert"></div>

      <!-- Security badges -->
      <div class="badge-row">
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5z"/></svg>
          AES-256-GCM
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V5l-9-4z"/></svg>
          ECDH Key Exchange
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          Voice &amp; Video Calls
        </span>
      </div>

    </div>

    <!-- Feature cards below the main card -->
    <div class="feature-cards">
      <div class="feature-card">
        <div class="feature-card-icon cyan">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5z"/></svg>
        </div>
        <div class="feature-card-title">Zero Knowledge</div>
        <div class="feature-card-sub">Server never sees plaintext</div>
      </div>
      <div class="feature-card">
        <div class="feature-card-icon purple">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V5l-9-4z"/></svg>
        </div>
        <div class="feature-card-title">Auto-Expiry</div>
        <div class="feature-card-sub">Messages vanish in 24h</div>
      </div>
      <div class="feature-card">
        <div class="feature-card-icon blue">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <div class="feature-card-title">2-Person Max</div>
        <div class="feature-card-sub">Truly private sessions</div>
      </div>
    </div>

  </main>

  <script src="/js/app.js"></script>
</body>
</html>
