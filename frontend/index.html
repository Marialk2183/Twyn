<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LockChat — Secure, private, end-to-end encrypted 1-to-1 chat">
  <meta name="robots" content="noindex, nofollow">
  <title>LockChat — Private Encrypted Chat</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Preconnect for fonts (optional) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>
  <main class="landing">
    <div class="landing-card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v2h6V7a3 3 0 0 0-3-3zm0 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
          </svg>
        </div>
        <h1 class="logo-title">LockChat</h1>
        <p class="logo-sub">End-to-end encrypted · 2-person private rooms</p>
      </div>

      <!-- Create Room -->
      <button class="btn btn-primary" id="create-btn">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        <span id="spinner"></span>
        Create Private Room
      </button>

      <div class="divider">or join with a code</div>

      <!-- Join Room -->
      <div class="join-row">
        <input
          type="text"
          id="join-input"
          placeholder="Room code or link (e.g. ABX92K)"
          maxlength="128"
          autocomplete="off"
          spellcheck="false"
          aria-label="Room code or link"
        >
        <button class="btn btn-secondary btn-sm" id="join-btn">Join</button>
      </div>

      <div id="status-msg" class="status-msg" role="alert"></div>

      <!-- Security badges -->
      <div class="badge-row">
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5z"/></svg>
          AES-256-GCM
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.35C17.25 21.15 21 16.25 21 11V5l-9-4z"/></svg>
          ECDH Key Exchange
        </span>
        <span class="badge">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z"/></svg>
          Max 2 Users
        </span>
      </div>

    </div>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
