<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>LockChat — Private Room</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="chat-page">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header class="chat-header">
      <div class="chat-header-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v2h6V7a3 3 0 0 0-3-3zm0 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
        </svg>
      </div>

      <div class="chat-header-info">
        <div class="chat-header-title">Private Room</div>
        <div class="chat-header-sub">
          Code: <span class="room-id-badge" id="room-id-display">······</span>
        </div>
      </div>

      <!-- End-to-end encryption badge — shown after key exchange -->
      <div id="encrypt-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5z"/>
        </svg>
        E2E Encrypted
      </div>
    </header>

    <!-- ── Status Bar ──────────────────────────────────────────────────────── -->
    <div class="status-bar status-connecting" id="status-bar">
      Connecting…
    </div>

    <!-- ── Share Link Bar ──────────────────────────────────────────────────── -->
    <div class="copy-bar">
      <span>Share this room: <strong id="room-link-display"></strong></span>
      <button id="copy-link-btn">Copy Link</button>
    </div>

    <!-- ── Messages ───────────────────────────────────────────────────────── -->
    <div id="messages" role="log" aria-label="Chat messages" aria-live="polite">
      <!-- Messages rendered by JS -->
    </div>

    <!-- ── Typing Indicator ────────────────────────────────────────────────── -->
    <div id="typing-indicator" role="status" aria-live="polite">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      Other is typing…
    </div>

    <!-- ── Input Area ──────────────────────────────────────────────────────── -->
    <div class="chat-input-area">
      <textarea
        id="message-input"
        placeholder="Message is encrypted before sending…"
        rows="1"
        maxlength="4000"
        disabled
        aria-label="Type a message"
      ></textarea>
      <button id="send-btn" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- ── Waiting Overlay ────────────────────────────────────────────────── -->
    <div class="overlay" id="waiting-overlay" role="status">
      <div class="overlay-icon">
        <!-- Hourglass / waiting icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
        </svg>
      </div>
      <p id="waiting-msg">Waiting for other person to join…&#10;Share the link above!</p>
    </div>

    <!-- ── Error Overlay ──────────────────────────────────────────────────── -->
    <div class="overlay" id="error-overlay" role="alert">
      <div class="overlay-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="error-msg">Something went wrong.</p>
      <a href="/" class="btn btn-primary" style="width:auto;padding:0.65rem 1.5rem;">
        Back to Home
      </a>
    </div>

  </div><!-- /.chat-page -->

  <!-- Socket.IO client (served by the backend) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- E2E crypto module (must load before chat.js) -->
  <script src="/js/crypto.js"></script>
  <!-- Chat logic -->
  <script src="/js/chat.js"></script>

  <!-- Inline: populate the room link display -->
  <script>
    (function () {
      const match = location.pathname.match(/\/room\/([A-Za-z0-9]{6})$/);
      if (match) {
        const el = document.getElementById('room-link-display');
        if (el) el.textContent = location.origin + '/room/' + match[1].toUpperCase();
      }
    })();
  </script>
</body>
</html>
