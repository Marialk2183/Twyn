<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>LockChat — Private Room</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="chat-page">

    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header class="chat-header">
      <div class="chat-header-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v2h6V7a3 3 0 0 0-3-3zm0 9a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
        </svg>
      </div>

      <div class="chat-header-info">
        <div class="chat-header-title">
          Private Room
          <span class="peer-status-dot" id="peer-status-dot"></span>
        </div>
        <div class="chat-header-sub" id="peer-status-text">Connecting…</div>
      </div>

      <!-- Voice & Video call buttons — enabled once peer is online -->
      <div class="call-buttons">
        <button class="call-btn" id="voice-call-btn" disabled title="Voice call" aria-label="Start voice call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
        </button>
        <button class="call-btn" id="video-call-btn" disabled title="Video call" aria-label="Start video call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </button>
      </div>

      <!-- End-to-end encryption badge — shown after key exchange -->
      <div id="encrypt-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 0 1 5 5v2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2h1V7a5 5 0 0 1 5-5z"/>
        </svg>
        E2E Encrypted
      </div>
    </header>

    <!-- ── Status Bar ──────────────────────────────────────────────────────── -->
    <div class="status-bar status-connecting" id="status-bar">
      Connecting…
    </div>

    <!-- ── Share Link Bar ──────────────────────────────────────────────────── -->
    <div class="copy-bar">
      <span>Room: <strong id="room-id-display">······</strong> &nbsp;|&nbsp; <strong id="room-link-display"></strong></span>
      <button id="copy-link-btn">Copy Link</button>
    </div>

    <!-- ── Messages ───────────────────────────────────────────────────────── -->
    <div id="messages" role="log" aria-label="Chat messages" aria-live="polite">
      <!-- Messages rendered by JS -->
    </div>

    <!-- ── Typing Indicator ────────────────────────────────────────────────── -->
    <div id="typing-indicator" role="status" aria-live="polite">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      Other is typing…
    </div>

    <!-- ── Input Area ──────────────────────────────────────────────────────── -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="Message is encrypted before sending…"
          rows="1"
          maxlength="4000"
          disabled
          aria-label="Type a message"
        ></textarea>
      </div>
      <button id="send-btn" disabled aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

    <!-- ── Waiting Overlay ────────────────────────────────────────────────── -->
    <div class="overlay" id="waiting-overlay" role="status">
      <div class="overlay-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
        </svg>
      </div>
      <p id="waiting-msg">Waiting for other person to join…&#10;Share the link above!</p>
    </div>

    <!-- ── Error Overlay ──────────────────────────────────────────────────── -->
    <div class="overlay" id="error-overlay" role="alert">
      <div class="overlay-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p id="error-msg">Something went wrong.</p>
      <a href="/" class="btn btn-primary" style="width:auto;padding:0.65rem 1.5rem;">
        Back to Home
      </a>
    </div>

    <!-- ── Incoming Call Modal ────────────────────────────────────────────── -->
    <div id="incoming-call-modal" role="dialog" aria-label="Incoming call">
      <div class="incoming-call-icon" id="incoming-call-icon">
        <!-- icon swapped by JS -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
      </div>
      <div class="incoming-call-type" id="incoming-call-label">Incoming voice call</div>
      <div class="incoming-call-title">Other person is calling…</div>
      <div class="incoming-call-actions">
        <button class="call-accept-btn" id="accept-call-btn" aria-label="Accept call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
          </svg>
        </button>
        <button class="call-reject-btn" id="reject-call-btn" aria-label="Reject call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 7a1 1 0 0 0-1.41 0L12 13.17 5.82 7a1 1 0 0 0-1.41 1.41L10.59 15l-6.18 6.18a1 1 0 1 0 1.41 1.41L12 16.41l6.18 6.18a1 1 0 0 0 1.41-1.41L13.41 15l6.18-6.18a1 1 0 0 0 0-1.82z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Active Voice Call Bar ──────────────────────────────────────────── -->
    <div id="voice-call-overlay" role="region" aria-label="Active voice call">
      <svg class="voice-call-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
      </svg>
      <span class="call-timer" id="voice-call-timer">00:00</span>
      <div class="call-controls">
        <button class="call-ctrl-btn mute" id="voice-mute-btn" title="Mute" aria-label="Toggle mute">
          <!-- mic svg -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1 1.93V18H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93z"/>
          </svg>
        </button>
        <button class="call-ctrl-btn end-call" id="voice-end-btn" title="End call" aria-label="End call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 7a1 1 0 0 0-1.41 0L12 13.17 5.82 7a1 1 0 0 0-1.41 1.41L10.59 15l-6.18 6.18a1 1 0 1 0 1.41 1.41L12 16.41l6.18 6.18a1 1 0 0 0 1.41-1.41L13.41 15l6.18-6.18a1 1 0 0 0 0-1.82z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Active Video Call Overlay ──────────────────────────────────────── -->
    <div id="video-call-overlay" role="region" aria-label="Active video call">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video"  autoplay playsinline muted></video>
      <div class="video-call-timer" id="video-call-timer">00:00</div>
      <div class="video-call-controls">
        <button class="video-ctrl-btn mute" id="video-mute-btn" title="Mute" aria-label="Toggle mute">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm-1 1.93V18H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93z"/>
          </svg>
        </button>
        <button class="video-ctrl-btn end-call" id="video-end-btn" title="End call" aria-label="End call">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" transform="rotate(135 12 12)"/>
          </svg>
        </button>
        <button class="video-ctrl-btn camera" id="video-camera-btn" title="Toggle camera" aria-label="Toggle camera">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Hidden audio element for remote voice stream -->
    <audio id="remote-audio" autoplay></audio>

  </div><!-- /.chat-page -->

  <!-- Particle background (same as landing) -->
  <script>
    (function () {
      const canvas = document.getElementById('bg-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      const P = Array.from({ length: 55 }, () => ({
        x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.28, vy: (Math.random() - 0.5) * 0.28,
        r: Math.random() * 1.4 + 0.3, op: Math.random() * 0.3 + 0.05,
        col: ['rgba(0,212,170,', 'rgba(124,58,237,', 'rgba(6,182,212,'][Math.floor(Math.random() * 3)]
      }));
      let raf;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        P.forEach((p, i) => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.col + p.op + ')'; ctx.fill();
          P.slice(i + 1).forEach(q => {
            const d = Math.hypot(p.x - q.x, p.y - q.y);
            if (d < 110) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = 'rgba(0,212,170,' + (0.09 * (1 - d / 110)) + ')';
              ctx.lineWidth = 0.5; ctx.stroke(); }
          });
        });
        raf = requestAnimationFrame(draw);
      }
      draw();
      document.addEventListener('visibilitychange', () => { if (document.hidden) cancelAnimationFrame(raf); else draw(); });
    })();
  </script>

  <!-- Socket.IO client (served by the backend) -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- E2E crypto module (must load before chat.js) -->
  <script src="/js/crypto.js"></script>
  <!-- Chat logic -->
  <script src="/js/chat.js"></script>

  <!-- Inline: populate the room link display -->
  <script>
    (function () {
      const match = location.pathname.match(/\/room\/([A-Za-z0-9]{6})$/);
      if (match) {
        const code = match[1].toUpperCase();
        const codeEl = document.getElementById('room-id-display');
        const linkEl = document.getElementById('room-link-display');
        if (codeEl) codeEl.textContent = code;
        if (linkEl) linkEl.textContent = location.origin + '/room/' + code;
      }
    })();
  </script>
</body>
</html>
